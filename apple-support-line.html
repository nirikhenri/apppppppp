<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Support Assistance</title>
    <link rel="icon" href="https://www.apple.com/favicon.ico">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #1d1d1f;
            text-align: center;
        }

        header {
            background-color: #1d1d1f;
            padding: 15px 0;
            margin-bottom: 40px;
        }

        .apple-logo {
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 40px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        p {
            font-size: 19px;
            color: #515154;
            line-height: 1.47;
            margin-bottom: 30px;
        }

        .call-btn {
            display: inline-block;
            background-color: #0071e3;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 17px;
            font-weight: 400;
            border-radius: 980px; /* Round Apple-style button */
            margin-bottom: 40px;
            transition: background 0.2s;
        }

        .call-btn:hover {
            background-color: #0077ed;
        }

        .status-container {
            margin-top: 20px;
        }

        .availability {
            font-size: 12px;
            font-weight: 600;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .number {
            font-size: 32px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 40px;
        }

        footer {
            margin-top: 60px;
            font-size: 12px;
            color: #86868b;
            padding-bottom: 40px;
        }

        .divider {
            height: 1px;
            background-color: #d2d2d7;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="apple-logo"></a>
    </header>

    <div class="container">
        <h1>Contact Apple Support</h1>
        
        <p>Need help with your device? Our team is ready to assist you.</p>

        <a href="tel:+18882092953" class="call-btn">📞 Call Support Now</a>

        <div class="status-container">
            <div class="availability">AVAILABLE 24/7 IN THE US</div>
            <div class="number">1-888-209-2953</div>
        </div>

        <div class="divider"></div>

        <footer>
            Official Apple Support USA. Standard call rates may apply.
        </footer>
    </div>

</body>
